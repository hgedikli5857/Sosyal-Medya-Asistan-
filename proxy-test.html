<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proxy Test</title>
<style>
body{font-family:Arial,sans-serif;max-width:500px;margin:20px auto;padding:16px;background:#0F1E3C;color:#fff;}
input{width:100%;padding:8px;margin:4px 0 10px;border:1px solid #444;border-radius:6px;background:#1a2a4a;color:#fff;box-sizing:border-box;}
button{width:100%;padding:10px;background:#C9A84C;color:#0F1E3C;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-bottom:6px;}
pre{background:#111;padding:10px;border-radius:8px;font-size:11px;white-space:pre-wrap;max-height:300px;overflow-y:auto;color:#0f0;}
label{font-size:12px;color:#aaa;}
</style>
</head>
<body>
<h2 style="color:#C9A84C;">🔧 Proxy Test</h2>
<label>Proxy URL</label>
<input id="proxy" value="https://ai-proxy.h-gedikli5857.workers.dev">
<label>Ideogram Key</label>
<input type="password" id="ideogram" placeholder="Jk6fRY1R...">
<label>Replicate Key (Flux)</label>
<input type="password" id="replicate" placeholder="r8_...">
<button onclick="testProxy()">1. Proxy Ping</button>
<button onclick="testIdeogram()">2. Ideogram Test</button>
<button onclick="testFlux()">3. Flux Test</button>
<pre id="log">Sonuçlar burada görünecek...</pre>
<script>
function log(msg){
  var el=document.getElementById('log');
  el.textContent+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}
function clear(){document.getElementById('log').textContent='';}

async function testProxy(){
  clear();
  var proxy=document.getElementById('proxy').value.trim();
  log('Ping: '+proxy);
  try{
    var r=await fetch(proxy+'?service=ping',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var d=await r.json();
    log('Status: '+r.status);
    log('Yanıt: '+JSON.stringify(d));
    if(d.status==='ok') log('✅ PROXY ÇALIŞIYOR!');
  }catch(e){log('❌ HATA: '+e.message);}
}

async function testIdeogram(){
  clear();
  var proxy=document.getElementById('proxy').value.trim();
  var key=document.getElementById('ideogram').value.trim();
  if(!key){log('Ideogram key gir!');return;}
  log('Ideogram test...');
  try{
    var r=await fetch(proxy+'?service=ideogram',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:key,image_request:{prompt:'wellness health test',aspect_ratio:'ASPECT_1_1',model:'V_2',magic_prompt_option:'AUTO'}})
    });
    var d=await r.json();
    log('Status: '+r.status);
    if(d.data&&d.data[0]){log('✅ GÖRSEL: '+d.data[0].url);}
    else{log('Yanıt: '+JSON.stringify(d).substring(0,300));}
  }catch(e){log('❌ HATA: '+e.message);}
}

async function testFlux(){
  clear();
  var proxy=document.getElementById('proxy').value.trim();
  var key=document.getElementById('replicate').value.trim();
  if(!key){log('Replicate key gir!');return;}
  log('Flux test...');
  try{
    var r=await fetch(proxy+'?service=replicate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:key,input:{prompt:'wellness health minimal',num_outputs:1,aspect_ratio:'1:1',output_format:'webp'}})
    });
    var d=await r.json();
    log('Status: '+r.status);
    if(d.id){
      log('Prediction ID: '+d.id);
      log('Bekliyor...');
      for(var i=0;i<10;i++){
        await new Promise(function(res){setTimeout(res,3000);});
        var r2=await fetch(proxy+'?service=replicate_get',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({api_key:key,prediction_url:d.urls.get})
        });
        var d2=await r2.json();
        log('Poll '+i+': '+d2.status);
        if(d2.status==='succeeded'){log('✅ URL: '+d2.output[0]);break;}
        if(d2.status==='failed'){log('❌ Başarısız');break;}
      }
    }else{log('Yanıt: '+JSON.stringify(d).substring(0,300));}
  }catch(e){log('❌ HATA: '+e.message);}
}
</script>
</body>
</html>
